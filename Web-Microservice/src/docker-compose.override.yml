  # orderdb sqlserver
  orderdb:
    container_name: orderdb
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
        SA_PASSWORD: "KvM1996$"
        ACCEPT_EULA: "Y"
    restart: always
    volumes:
    - sqlserver_data:/var/lib/sqlserver/data
    ports:
    - "1435:1433"
  
  # productdb mysql
  productdb:
    container_name: mysqldb
    image: mysql:8.0.29
    environment: 
        MYSQL_ROOT_PASSWORD: "KvM1996$"
    restart: always
    volumes:
    - mysql_data:/var/lib/mysql
    ports:
    - "3306:3306"
  
  # customerdb postgresDb
  customerdb:
    container_name: postgresdb
    image: postgres:alpine3.16
    environment:
    - POSTGRES_USER=admin
    - POSTGRES_PASSWORD=admin1234
    - POSTGRES_DB=CustomerDb
    ports:
    - "5433:5432"  
    volumes:
    - postgres_data:/var/lib/postgresql/data
  
  # basket redis
  basketdb:
    container_name: basketdb
    image: redis:alpine
    restart: always
    ports:
    - "6379:6379"
  
  # inventoryDb mongoDb
  inventorydb:
    container_name: inventorydb
    image: mongo
    restart: always
    ports:
    - "27017:27017"
    volumes:
    - mongo_data:/data/lib
   
  

  # Infrastructure section
  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3-management-alpine
    restart: always
    ports:
    - "5672:5672"
    - "15672:15672"
  
  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4
    environment:
    - PGADMIN_DEFAULT_EMAIL:admin1234@microservice.com
    - PGADMIN_DEFAULT_PASSWORD:admin1234
    restart: always
    ports:
    - "5050:80"
    volumes: 
    - pgadmin_data:/root/.pgadmin

  portainer:
    container_name: portainer
    image: portainer/portainer-ce
    restart: always
    ports:
    - "8080:8000"
    - "9000:9000"
    volumes: 
    - /var/run/docker.sock:/var/run/docker.sock
    - portainer_data:/data

  elasticsearch:
    container_name: elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.2
    environment:
    - xpack.monitoring.enabled=true
    - xpack.watcher.enabled=false
    - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    - discovery.type=single-node
    ports:
    - "9200:9200"  
    volumes:
    - elasticsearch_data:/usr/share/elasticsearch/data

  kibana:
    container_name: kibana
    image: docker.elastic.co/kibana/kibana:7.17.2
    environment:
    - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
    - elasticsearch
    ports:
    - "5601:5601"

  # Microservices section
  product.api:
    container_name: product.api
    environment:
     - ASPNETCORE_ENVIRONMENT=Development
     - ASPNETCORE_URLS=http://+:80
     - "ConnectionStrings:DefaultConnectionString=Server=productdb;Port=3306;Database=ProductDb;Uid=root;Pwd=KvM1996$;"
    depends_on:
     - productdb
    ports:
     - "6002:80"
    restart: always